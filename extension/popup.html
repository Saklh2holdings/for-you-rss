<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ForYou RSS Sync</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px 10px;
      border-bottom: 1px solid #e5e5e5;
    }

    header h1 { font-size: 14px; font-weight: 600; }

    #server-host {
      font-size: 11px;
      color: #888;
      text-overflow: ellipsis;
      overflow: hidden;
      max-width: 160px;
      white-space: nowrap;
    }

    /* ---- Platform sections ---- */
    .platform-list { padding: 4px 0; }

    .platform-section {
      border-bottom: 1px solid #f0f0f0;
      padding: 8px 14px;
    }

    .platform-section:last-child { border-bottom: none; }

    /* Top row: dot + name + status */
    .platform-main {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-green  { background: #22c55e; }
    .dot-yellow { background: #f59e0b; }
    .dot-red    { background: #ef4444; }

    .platform-name { font-weight: 500; flex: 1; }

    .platform-status-label { font-size: 11px; color: #999; }

    /* ---- Single Sync button (disconnected state) ---- */
    .sync-btn {
      padding: 3px 10px;
      border: 1px solid #d1d5db;
      border-radius: 5px;
      background: #fff;
      color: #374151;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.12s, color 0.12s;
    }

    .sync-btn:not(:disabled):hover { background: #2563eb; color: #fff; border-color: #2563eb; }
    .sync-btn:disabled { color: #bbb; border-color: #e5e5e5; cursor: not-allowed; }
    .sync-btn.hidden { display: none; }

    /* ---- RSS strip (connected state) ---- */
    .rss-strip {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 5px;
      padding: 4px 8px;
    }

    .rss-url {
      flex: 1;
      font-size: 10px;
      color: #4b5563;
      font-family: 'SF Mono', 'Fira Code', monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .rss-copy-btn {
      padding: 2px 7px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      background: #fff;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      color: #374151;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.1s;
    }

    .rss-copy-btn:hover { background: #f3f4f6; }
    .rss-copy-btn.copied { color: #22c55e; border-color: #86efac; }

    .rss-open-link {
      font-size: 10px;
      color: #2563eb;
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .rss-open-link:hover { text-decoration: underline; }

    /* ---- Connected actions row: Re-sync + Disconnect ---- */
    .platform-actions {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }

    .action-btn {
      padding: 3px 10px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.12s;
      border: none;
    }

    .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .action-btn:not(:disabled):hover { opacity: 0.85; }

    .btn-resync    { background: #2563eb; color: #fff; }
    .btn-disconnect { background: #ef4444; color: #fff; }

    /* ---- Misc ---- */
    .hint {
      margin-top: 4px;
      margin-left: 17px;
      font-size: 11px;
      color: #d97706;
    }

    .platform-error {
      margin-top: 4px;
      font-size: 11px;
      color: #ef4444;
    }

    footer {
      padding: 9px 14px 11px;
      border-top: 1px solid #e5e5e5;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #last-sync-label { font-size: 11px; color: #aaa; }

    a { color: #2563eb; text-decoration: none; font-size: 11px; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <h1>ForYou RSS</h1>
    <span id="server-host">localhost:3000</span>
  </header>

  <div class="platform-list" id="platform-list"></div>

  <footer>
    <span id="last-sync-label"></span>
    <a id="options-link" href="#">Options</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
